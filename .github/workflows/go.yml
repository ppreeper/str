name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Grant permissions needed to upload coverage to GitHub
permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: 1.18

      - name: Build
        run: go build -v ./...

      - name: Test (with coverage)
        run: |
          go test -coverprofile=coverage.out -covermode=atomic -v ./...

      - name: Install gocover-cobertura
        run: |
          go install github.com/t-yuki/gocover-cobertura@latest
          echo "gocover-cobertura installed at $(go env GOPATH)/bin"

      - name: Convert coverage to Cobertura XML
        run: |
          $(go env GOPATH)/bin/gocover-cobertura < coverage.out > coverage.xml

      - name: Upload coverage to GitHub (native)
        uses: actions/upload-coverage@v1
        with:
          path: coverage.xml
